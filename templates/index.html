<!DOCTYPE html>
<html>
<head>
  <title>Talent Scout Agent</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <h1>AI-Powered Talent Scouting Agent</h1>
  <form id="jdForm" enctype="multipart/form-data">
    <label>Job Description:</label><br/>
    <textarea name="jd" placeholder="Enter job description here..." rows="6" cols="50"></textarea><br/><br/>

    <label>Upload Candidate CSV (Optional):</label><br/>
    <input type="file" name="candidates_file"><br/><br/>

    <button type="submit">Rank Candidates</button>
  </form>

  <div id="results"></div>

  <script>
    document.getElementById("jdForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const formData = new FormData(this);
      const res = await fetch("/rank", {
        method: "POST",
        body: formData
      });
      const data = await res.json();
      let html = "<h2>Ranked Candidates:</h2><table border='1'><tr><th>Name</th><th>Match Score</th><th>Interest Score</th><th>Final Score</th></tr>";
      data.forEach(c => {
        html += `<tr><td>${c.name}</td><td>${c.match_score}%</td><td>${c.interest_score}%</td><td>${c.final_score}%</td></tr>`;
      });
      html += "</table>";
      document.getElementById("results").innerHTML = html;
    });
  </script>
</body>
</html>
